<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Coupons ❤️</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ffe6e6; 
            text-align: center; 
            padding: 20px; 
            color: #333;
        }
        h1 { color: #d6336c; }
        
        /* Login Screen Styles */
        #login-screen {
            margin-top: 15vh;
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            border: 2px dashed #d6336c;
            max-width: 90%;
            width: 320px;
        }
        #login-screen h2 { color: #d6336c; margin-top: 0; }
        #passcode-input {
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ffb3c6;
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 15px;
            width: 80%;
            text-align: center;
        }
        #passcode-input:focus { outline: none; border-color: #d6336c; }
        #error-msg { color: #d6336c; font-weight: bold; display: none; margin-top: 10px; font-size: 0.9rem;}

        /* Coupon Styles */
        .coupon-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        .coupon { 
            background: white; 
            border: 2px dashed #d6336c; 
            border-radius: 12px; 
            padding: 20px; 
            width: 250px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            transition: transform 0.2s; 
        }
        .coupon:hover { transform: scale(1.03); }
        .coupon h3 { margin-top: 0; color: #d6336c; font-size: 1.2rem;}
        .desc { font-size: 0.95rem; margin-bottom: 20px;}
        
        .btn { 
            background-color: #d6336c; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            font-size: 1rem;
        }
        .btn:hover { background-color: #a61e4d; }
        
        .redeemed { 
            background-color: #f8f9fa; 
            border-color: #adb5bd; 
            color: #6c757d; 
            transform: none !important; 
            opacity: 0.8;
        }
        .redeemed h3 { color: #6c757d; text-decoration: line-through; }
        .redeemed .btn { display: none; } 
        
        .redeemed-text { 
            color: #a61e4d; 
            font-weight: bold; 
            margin-top: 10px; 
            margin-bottom: 15px;
            display: none; 
        }
        .redeemed .redeemed-text { display: block; }

        .btn-undo {
            background-color: transparent;
            color: #6c757d;
            border: 1px solid #6c757d;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            display: none;
        }
        .btn-undo:hover { background-color: #e9ecef; }
        .redeemed .btn-undo { display: inline-block; } 

    </style>
</head>
<body>

    <div id="login-screen">
        <h2>🔒 Top Secret</h2>
        <p>Enter the magic word to unlock your gift!</p>
        <input type="text" id="passcode-input" placeholder="Type here...">
        <br>
        <button class="btn" style="width: 80%;" onclick="checkPasscode()">Unlock</button>
        <p id="error-msg">Oops! That's not it. Try again! 💕</p>
    </div>

    <div id="main-content" style="display: none;">
        <h1>Special Coupons Just For You ❤️</h1>
        <p>Choose wisely! Tap redeem and show me your screen to cash it in.</p>
        <div class="coupon-container" id="coupons"></div>
    </div>

    <script>
        // ==========================================
        // 1. SET YOUR SECRET PASSCODE HERE
        // ==========================================
        const SECRET_PASSCODE = "iloveyou"; // Change this to whatever you want!
        
        // ==========================================
        // 2. EDIT YOUR COUPONS HERE
        // ==========================================
        const couponsData = [
            { id: 'c1', title: '🥞 Breakfast in Bed', desc: 'I will make your favorite breakfast.' },
            { id: 'c2', title: '💆‍♀️ 30-Minute Massage', desc: 'A relaxing massage, anytime you want.' },
            { id: 'c3', title: '🍽️ Dining Out', desc: 'Your choice of restaurant, my treat!' },
            { id: 'c4', title: '🎬 Movie Picker', desc: 'You choose the movie, I bring the snacks.' },
            { id: 'c5', title: '🧹 Chore Pass', desc: 'Pass off one of your chores to me for the day.' },
            { id: 'c6', title: '🍷 Evening Drinks', desc: 'I will prepare your favorite cocktail or pour the wine.' }
        ];

        // --- Passcode Logic ---
        function checkPasscode() {
            // Get what she typed, make it lowercase, and remove extra spaces
            const input = document.getElementById('passcode-input').value.toLowerCase().trim();
            
            // Check if it matches (also making your secret code lowercase just in case)
            if (input === SECRET_PASSCODE.toLowerCase()) {
                // Save that she unlocked it so she doesn't have to type it every time she opens the link
                localStorage.setItem('siteUnlocked', 'true');
                showCoupons();
            } else {
                // Show error message
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function showCoupons() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderCoupons();
        }

        // --- Coupon Logic ---
        const container = document.getElementById('coupons');

        function renderCoupons() {
            container.innerHTML = '';
            couponsData.forEach(coupon => {
                const isRedeemed = localStorage.getItem(coupon.id) === 'true';
                
                const card = document.createElement('div');
                card.className = `coupon ${isRedeemed ? 'redeemed' : ''}`;
                
                card.innerHTML = `
                    <h3>${coupon.title}</h3>
                    <p class="desc">${coupon.desc}</p>
                    <button class="btn" onclick="redeem('${coupon.id}')">Redeem Now</button>
                    <div class="redeemed-text">Redeemed! ✨</div>
                    <button class="btn-undo" onclick="undoRedeem('${coupon.id}')">Oops, Undo</button>
                `;
                container.appendChild(card);
            });
        }

        function redeem(id) {
            if(confirm('Are you sure you want to redeem this coupon right now? Make sure to show me!')) {
                localStorage.setItem(id, 'true'); 
                renderCoupons(); 
            }
        }

        function undoRedeem(id) {
            localStorage.removeItem(id);
            renderCoupons();
        }

        // --- Start Up Check ---
        // When she opens the page, check if she already unlocked it in the past
        if (localStorage.getItem('siteUnlocked') === 'true') {
            showCoupons();
        }
    </script>

</body>
</html>
